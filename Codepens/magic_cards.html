<!DOCTYPE html>
<html lang="en">
	<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width,  initial-scale=1.0">
		<title>Magic Card Transforms</title>
		<link href="styles.css" media="screen" rel="stylesheet" type="text/css">
	</head>
  <body>
    <div id="container">
      <img src="Images/jushi-apprentice.jpg" alt="Jushi Apprentice" id="jushi">
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="Images/tergrid-god-of-fright.jpg" alt="Tergrid, God of Fright" id="tergrid-1">
          </div>
          <div class="flip-card-back">
            <img src="Images/tergrids-lantern.jpg" alt="Tergrid's Lantern'" id="tergrid-2">
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
